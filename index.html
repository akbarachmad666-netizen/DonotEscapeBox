<!DOCTYPE html>
<html>
<head>
  <title>Don't Escape Box</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">Don't Escape Box</h1>
<p id="text" class="text">You wake up trapped. Something feels off...</p>

<div class="room">
  <div class="item" onclick="checkBox()">📦 Box</div>
  <div class="item" onclick="checkPaper()">📄 Paper</div>
  <div class="item" onclick="checkWall()">🧱 Wall</div>
  <div class="item" onclick="checkDoor()">🚪 Door</div>
</div>

<div class="inventory">
  <h3>Inventory</h3>
  <p id="items">Empty</p>
</div>

<!-- Keypad -->
<div id="keypad" class="keypad hidden">
  <p>Enter Code:</p>
  <input id="codeInput" disabled>

  <div class="keys">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button onclick="clearCode()">C</button>
    <button onclick="press(0)">0</button>
    <button onclick="submitCode()">OK</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
